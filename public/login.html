<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1d9e75" />
  <link rel="manifest" href="/manifest.json" />
  <title>MoneyMap</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body data-page="login">
  <div class="center-screen">
    <div class="login-card">
      <div class="brandmark">M</div>
      <h1>MoneyMap</h1>
      <div class="tag">The AI CRM for building-materials reps.</div>
      <form id="loginForm">
        <label for="email">Email</label>
        <input id="email" type="email" autocomplete="username" value="admin@comptonsales.com" />
        <label for="password">Password</label>
        <input id="password" type="password" autocomplete="current-password" value="demo1234" />
        <button class="btn" type="submit">Sign in</button>
      </form>
      <div id="loginNote"></div>
      <div class="hint">Demo: admin@comptonsales.com / demo1234</div>
    </div>
  </div>
  <script src="/app.js"></script>
</body>
</html>
