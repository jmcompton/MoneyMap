<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1d9e75" />
  <link rel="manifest" href="/manifest.json" />
  <title>Import · MoneyMap</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body data-page="import">
  <div class="app">
    <header class="top">
      <div><h1>Import commissions</h1><div class="sub">Upload a CSV or a PDF statement. We match and rank it.</div></div>
    </header>

    <div class="seg">
      <button class="segbtn active" data-src="csv" type="button">CSV</button>
      <button class="segbtn" data-src="pdf" type="button">PDF</button>
    </div>

    <form id="importForm" class="card src csv" style="padding:16px">
      <label for="file">Commission CSV</label>
      <input id="file" type="file" accept=".csv,text/csv" />
      <label for="manufacturer_id">Manufacturer</label>
      <select id="manufacturer_id"></select>
      <label for="period_label">Period</label>
      <input id="period_label" type="text" value="June 2026" />
      <div class="btn-row">
        <div style="flex:1">
          <label for="account_col">Account column</label>
          <input id="account_col" type="text" value="Account" />
        </div>
        <div style="flex:1">
          <label for="amount_col">Amount column</label>
          <input id="amount_col" type="text" value="Commission" />
        </div>
      </div>
      <button class="btn" type="submit">Import &amp; match</button>
      <div class="placeholder" style="margin-top:14px"><b>Tip</b>The sample CSV (data/sample-commission.csv) uses the column names above.</div>
    </form>

    <div class="card src pdf" hidden style="padding:16px">
      <label for="pdfFile">Commission PDF</label>
      <input id="pdfFile" type="file" accept="application/pdf,.pdf" />
      <label for="pdf_manufacturer_id">Manufacturer</label>
      <select id="pdf_manufacturer_id"></select>
      <label for="pdf_period_label">Period</label>
      <input id="pdf_period_label" type="text" value="June 2026" />
      <button class="btn" id="pdfRead" type="button">Read PDF</button>
      <div class="placeholder" style="margin-top:14px"><b>Tip</b>Try the sample (data/sample-commission.pdf). PDFs vary per manufacturer, so check the rows before importing.</div>
    </div>

    <div id="pdfPreview"></div>
    <div id="importNote"></div>
  </div>
  <nav class="bottom">
    <a href="/"><span class="ic" data-i="home"></span>Home</a>
    <a href="/planner.html"><span class="ic" data-i="planner"></span>Planner</a>
    <a href="/accounts.html"><span class="ic" data-i="accounts"></span>Accounts</a>
    <a href="/reconcile.html"><span class="ic" data-i="recover"></span>Recover</a>
    <a href="/import.html" class="active"><span class="ic" data-i="import"></span>Import</a>
  </nav>
  <script src="/app.js"></script>
</body>
</html>
